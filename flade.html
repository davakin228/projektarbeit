<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projektarbeit</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .slider-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 8px;
    }
    .slider-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(212,104,126,0.15);
      border: 1px solid rgba(212,104,126,0.4);
      color: #a0304a;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .slider-btn:hover { background: #d4687e; color: white; border-color: #d4687e; }
    #popup-img {
      width: 300px; height: 200px;
      object-fit: cover;
      border-radius: 12px;
      transition: opacity 0.15s ease, transform 0.2s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      flex-shrink: 0;
      cursor: zoom-in;
    }
    #popup-img:hover { transform: scale(1.03); }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 99999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: zoomIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    #lightbox-close {
      position: fixed;
      top: 20px; right: 24px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      z-index: 100000;
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    #popup-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(212,104,126,0.3);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .dot.active { background: #d4687e; transform: scale(1.3); }

    .music-btn {
      position: fixed;
      bottom: 28px; right: 28px;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(244,184,203,0.7);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(212,104,126,0.15);
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .music-btn:hover { background: linear-gradient(135deg, #d4687e, #e8809a); transform: scale(1.1); }
    .music-btn.playing { animation: musicPulse 2s ease-in-out infinite; }
    @keyframes musicPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(212,104,126,0.15); }
      50% { box-shadow: 0 4px 28px rgba(212,104,126,0.4); }
    }

    .hamburger-btn {
      position: fixed;
      top: 24px; right: 28px;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(244,184,203,0.7);
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px;
      box-shadow: 0 4px 16px rgba(212,104,126,0.15);
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .hamburger-btn:hover { background: linear-gradient(135deg, #d4687e, #e8809a); transform: scale(1.1); }
    .hamburger-btn span { display: block; width: 18px; height: 2px; background: #d4687e; border-radius: 2px; transition: all 0.3s ease; }
    .hamburger-btn:hover span { background: white; }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .dropdown-menu {
      position: fixed;
      top: 80px; right: 28px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(244,184,203,0.5);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(212,104,126,0.2);
      padding: 8px;
      z-index: 9998;
      min-width: 200px;
      opacity: 0;
      transform: translateY(-10px) scale(0.95);
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      font-family: "Dancing Script", cursive;
    }
    .dropdown-menu.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: all; }
    .menu-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #f4b8cb; padding: 8px 16px 4px; display: block; }
    .menu-divider-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(244,184,203,0.5), transparent); margin: 3px 8px; }
    .menu-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-radius: 10px; text-decoration: none; color: #8b4a5e; font-size: 16px; transition: all 0.2s ease; }
    .menu-item:hover { background: rgba(212,104,126,0.08); color: #d4687e; }
    .menu-item-icon { font-size: 15px; width: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="sakura-container">
    <div class="tree-overlay"></div>

    <div class="point" id="Schule_1970" style="top:85%; left:50%;"
      data-title="1970er Jahre – Tradition im Wandel"
      data-text="In dieser Zeit blieb die Flade fest in ihrer Rolle als katholische Sekundarschule für die Stadt St. Gallen verankert. Die Trennung zwischen Jungen und Mädchen war strikter Alltag. Während die Jungen im Gallusschulhaus unterrichtet wurden, besuchten die Mädchen das Notkerzentrum. Die Lehrerschaft bestand damals noch zu einem beachtlichen Teil aus Klerikern und Ordensschwestern, die das christliche Erbe der Schule bewahrten.">
      <span class="point-label">1970</span>
    </div>
    <div class="point" id="Schule_1980" style="top:58%; left:64%;"
      data-title="1980er Jahre – Fokus auf die Infrastruktur"
      data-text="Dieses Jahrzehnt war geprägt von der Modernisierung der alten Schulgebäude. Die Verantwortlichen investierten hohe Summen in die Fachzimmer und die Aula, um den technischen Fortschritt abzubilden. Man legte grossen Wert darauf, dass die historische Substanz im Klosterviertel erhalten blieb, während im Inneren moderne Lehrmittel einzogen.">
      <span class="point-label">1980</span>
    </div>
    <div class="point" id="Schule_1990" style="top:45%; left:23%;"
      data-title="1990er Jahre – Der Schritt zur Koedukation"
      data-text="Die wohl grösste Veränderung ereignete sich in den Neunzigern mit der schrittweisen Einführung des gemeinsamen Unterrichts. Die strikte Geschlechtertrennung wurde aufgehoben, was das soziale Klima an der Schule grundlegend erneuerte. Parallel dazu hielten die ersten Informatikräume Einzug.">
      <span class="point-label">1990</span>
    </div>
    <div class="point" id="Schule_2000" style="top:44%; left:85%;"
      data-title="2000er Jahre – Pädagogische Vielfalt"
      data-text="Mit der Jahrtausendwende rückte die individuelle Förderung der Jugendlichen in das Zentrum der Strategie. Die Flade profilierte sich durch ein breites Angebot an Wahlfächern und Projekten, die über den klassischen Lehrplan hinausgingen.">
      <span class="point-label">2000</span>
    </div>
    <div class="point" id="Schule_2010" style="top:24%; left:5%;"
      data-title="2010er Jahre – Infrastruktur und Digitalisierung"
      data-text="In diesem Jahrzehnt modernisierte die Flade ihre drei Standorte Gallus, Notker und Brühl umfassend. Ein grosser Meilenstein war die Einführung von iPads für den Unterricht. Die Lehrpersonen entwickelten sich von reinen Wissensvermittlern zu Lernbegleitern weiter.">
      <span class="point-label">2010</span>
    </div>
    <div class="point" id="Schule_heute" style="top:22%; left:52%;"
      data-title="Heute – Digitalisierung und Offenheit"
      data-text="In der Gegenwart präsentiert sich die Flade als eine der modernsten Sekundarschulen der Ostschweiz. Digitale Endgeräte wie iPads gehören zum Standardwerkzeug. Das Hauptaugenmerk liegt auf der Vorbereitung der jungen Menschen für die Berufswelt oder das Gymnasium.">
      <span class="point-label">heute</span>
    </div>

    <div id="overlay"></div>

    <div class="popup" id="popup">
      <div class="popup-content">
        <h2 id="popup-title"></h2>
        <div class="slider-wrap" id="slider-wrap">
          <button class="slider-btn" id="btn-prev">&#8592;</button>
          <img id="popup-img" src="" alt="Foto" title="Klicken zum Vergrößern" />
          <button class="slider-btn" id="btn-next">&#8594;</button>
        </div>
        <div id="popup-dots"></div>
        <p id="popup-text"></p>
      </div>
    </div>

    <audio id="bg-music" loop>
      <source src="https://github.com/davakin228/fladeSchule/raw/refs/heads/main/siarhei_korbut-japanese-flower-pixabay-329408.mp3" type="audio/mpeg">
    </audio>
  </div>

  <!-- Lightbox -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <button class="music-btn" id="musicBtn" title="Musik an/aus">🎵</button>

  <button class="hamburger-btn" id="hamburgerBtn">
    <span></span><span></span><span></span>
  </button>

  <div class="dropdown-menu" id="dropdownMenu">
    <span class="menu-label">Navigation</span>
    <a class="menu-item" href="index.html"><span class="menu-item-icon">🌸</span> Titelscreen</a>
    <div class="menu-divider-line"></div>
    <a class="menu-item" href="#"><span class="menu-item-icon">🌳</span> Flade Baum</a>
    <div class="menu-divider-line"></div>
    <a class="menu-item" href="quiz.html"><span class="menu-item-icon">📝</span> Quiz</a>
    <div class="menu-divider-line"></div>
    <a class="menu-item" href="https://www.flade.ch" target="_blank"><span class="menu-item-icon">🔗</span> flade.ch</a>
  </div>

  <script>
    const PHOTOS = {
      "Schule_1970": [
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1970(1).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1970(2).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1970(3).jpg"
      ],
      "Schule_1980": [
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1980(1).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1980(2).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1980(3).jpg"
      ],
      "Schule_1990": [
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1990(1).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1990(2).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/1990(3).jpg"
      ],
      "Schule_2000": [
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/2000(1).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/2000(2).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/2000(3).jpg"
      ],
      "Schule_2010": [
        "https://github.com/davakin228/fladeSchule/blob/main/flade%20schule.jpg?raw=true",
        "https://github.com/davakin228/fladeSchule/blob/main/andere%20Schule.jpg?raw=true",
        "https://github.com/davakin228/fladeSchule/blob/main/schule%20flade.jpg?raw=true"
      ],
      "Schule_heute": [
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/jetzt(1).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/jetzt(2).jpg",
        "https://raw.githubusercontent.com/davakin228/FOTOS-/main/jetzt(3).jpg"
      ]
    };

    // ── Petals ──
    function createPetal() {
      const petal = document.createElement('div');
      petal.className = "petal";
      const size = Math.random() * 12 + 6;
      petal.style.width = size + "px";
      petal.style.height = size + "px";
      petal.style.left = (Math.random() * 110 - 5) + "%";
      petal.style.top = "-20px";
      petal.style.position = "absolute";
      document.getElementById("sakura-container").appendChild(petal);
      const startRotate = Math.random() * 360;
      const swayX = Math.random() * 150 - 75;
      const rotateEnd = startRotate + Math.random() * 540 - 270;
      const duration = Math.random() * 6000 + 7000;
      const delay = Math.random() * 4000;
      petal.animate([
        { transform: `translate(0px,0px) rotate(${startRotate}deg)`, opacity: 0.8 },
        { transform: `translate(${swayX*.4}px,30vh) rotate(${startRotate+100}deg)`, opacity: 0.7, offset: 0.3 },
        { transform: `translate(${swayX*.7}px,60vh) rotate(${startRotate+220}deg)`, opacity: 0.5, offset: 0.6 },
        { transform: `translate(${swayX}px,110vh) rotate(${rotateEnd}deg)`, opacity: 0 }
      ], { duration, delay, easing: "ease-in-out", fill: "forwards" });
      setTimeout(() => petal.remove(), duration + delay + 200);
    }
    setInterval(createPetal, 300);

    // ── Slider ──
    const popup = document.getElementById("popup");
    const popupTitle = document.getElementById("popup-title");
    const popupText = document.getElementById("popup-text");
    const popupImg = document.getElementById("popup-img");
    const popupDots = document.getElementById("popup-dots");
    const sliderWrap = document.getElementById("slider-wrap");
    const overlay = document.getElementById("overlay");
    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");

    let activePoint = null;
    let currentPhotos = [];
    let currentIndex = 0;

    function updateSlider(index) {
      currentIndex = (index + currentPhotos.length) % currentPhotos.length;
      popupImg.style.opacity = 0;
      setTimeout(() => {
        popupImg.src = currentPhotos[currentIndex];
        popupImg.style.opacity = 1;
      }, 150);
      popupDots.querySelectorAll(".dot").forEach((d, i) =>
        d.classList.toggle("active", i === currentIndex));
    }

    function buildDots(count) {
      popupDots.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const d = document.createElement("span");
        d.className = "dot" + (i === 0 ? " active" : "");
        d.addEventListener("click", (e) => { e.stopPropagation(); updateSlider(i); });
        popupDots.appendChild(d);
      }
    }

    btnPrev.addEventListener("click", (e) => { e.stopPropagation(); updateSlider(currentIndex - 1); });
    btnNext.addEventListener("click", (e) => { e.stopPropagation(); updateSlider(currentIndex + 1); });

    document.addEventListener("keydown", (e) => {
      if (!popup.classList.contains("active")) return;
      if (e.key === "ArrowLeft") updateSlider(currentIndex - 1);
      if (e.key === "ArrowRight") updateSlider(currentIndex + 1);
      if (e.key === "Escape") closePopup();
    });

    function closePopup() {
      popup.classList.remove("active");
      overlay.classList.remove("active");
      activePoint = null;
    }

    document.querySelectorAll(".point").forEach(point => {
      point.addEventListener("click", (e) => {
        e.stopPropagation();
        if (activePoint === point) { closePopup(); return; }
        activePoint = point;

        popupTitle.textContent = point.getAttribute("data-title");
        popupText.textContent = point.getAttribute("data-text");

        currentPhotos = PHOTOS[point.id] || [];
        currentIndex = 0;

        if (currentPhotos.length > 0) {
          popupImg.src = currentPhotos[0];
          popupImg.style.opacity = 1;
          sliderWrap.style.display = "flex";
          buildDots(currentPhotos.length);
        } else {
          sliderWrap.style.display = "none";
          popupDots.innerHTML = "";
        }

        const rect = point.getBoundingClientRect();
        const margin = 10, gap = 12;
        const screenW = window.innerWidth, screenH = window.innerHeight;
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        popup.classList.add("active");
        overlay.classList.add("active");

        const popupW = popup.offsetWidth;
        const popupH = popup.offsetHeight;

        const positions = [
          { left: cx - popupW/2, top: rect.top - popupH - gap },
          { left: cx - popupW/2, top: rect.bottom + gap },
          { left: rect.right + gap, top: cy - popupH/2 },
          { left: rect.left - popupW - gap, top: cy - popupH/2 },
        ];

        function fits({ left, top }) {
          return left >= margin && top >= margin &&
                 left + popupW <= screenW - margin &&
                 top + popupH <= screenH - margin;
        }

        let chosen = positions.find(fits);
        if (!chosen) {
          chosen = positions.reduce((best, pos) => {
            const ov = (p) =>
              Math.max(0, margin-p.left) + Math.max(0, margin-p.top) +
              Math.max(0, p.left+popupW-(screenW-margin)) +
              Math.max(0, p.top+popupH-(screenH-margin));
            return ov(pos) < ov(best) ? pos : best;
          });
        }

        chosen.left = Math.min(Math.max(chosen.left, margin), screenW - popupW - margin);
        chosen.top = Math.min(Math.max(chosen.top, margin), screenH - popupH - margin);
        popup.style.left = chosen.left + "px";
        popup.style.top = chosen.top + "px";
      });
    });

    overlay.addEventListener("click", closePopup);

    // ── Music ──
    const bgMusic = document.getElementById('bg-music');
    const musicBtn = document.getElementById('musicBtn');
    bgMusic.volume = 0.15;
    let isPlaying = false;

    function tryPlay() {
      bgMusic.play().then(() => {
        isPlaying = true;
        musicBtn.textContent = '🎵';
        musicBtn.classList.add('playing');
      }).catch(() => {});
    }

    musicBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isPlaying) {
        bgMusic.pause();
        isPlaying = false;
        musicBtn.textContent = '🔇';
        musicBtn.classList.remove('playing');
      } else {
        tryPlay();
      }
    });

    document.addEventListener('mousemove', function startOnMove() {
      tryPlay();
      document.removeEventListener('mousemove', startOnMove);
    });

    // ── Hamburger ──
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    let menuOpen = false;

    hamburgerBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      menuOpen = !menuOpen;
      hamburgerBtn.classList.toggle('open', menuOpen);
      dropdownMenu.classList.toggle('open', menuOpen);
    });

    document.addEventListener('click', function() {
      if (menuOpen) {
        menuOpen = false;
        hamburgerBtn.classList.remove('open');
        dropdownMenu.classList.remove('open');
      }
    });

    dropdownMenu.addEventListener('click', function(e) { e.stopPropagation(); });

    // ── Lightbox ──
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');

    popupImg.addEventListener('click', function(e) {
      e.stopPropagation();
      lightboxImg.src = popupImg.src;
      lightbox.classList.add('open');
    });

    function closeLightbox() { lightbox.classList.remove('open'); }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
